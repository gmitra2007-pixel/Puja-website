<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gallery</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(to right, #fff8e1, #ffe0b2);
}

/* 🔙 Back Button */
.back-home {
  position: fixed;
  top: 5px;
  left: 20px;

  padding: 10px 20px;
  background: linear-gradient(45deg, #ff9800, #ffcc00);
  color: white;

  font-size: 14px;
  font-weight: bold;
  text-decoration: none;

  border-radius: 25px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);

  transition: 0.3s;
  z-index: 1001;
}

.back-home:hover {
  transform: scale(1.05);
}

/* Section */
.gallery-section {
  padding: 60px 20px;
  text-align: center;
}

/* Title */
.gallery-title-box {
  display: inline-block;
  padding: 12px 35px;
  margin-bottom: 40px;

  background: white;
  border-radius: 15px;

  font-size: 28px;
  font-weight: 600;
  color: #ff6f00;

  box-shadow: 0 8px 25px rgba(0,0,0,0.15);
}

/* Grid */
.gallery-container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;

  max-width: 1100px;
  margin: auto;
}

/* Image Card */
.gallery-item {
  overflow: hidden;
  border-radius: 15px;
  cursor: pointer;
}

.gallery-item img {
  width: 100%;
  height: 230px;
  object-fit: cover;
  transition: 0.4s;
}

.gallery-item:hover img {
  transform: scale(1.1);
}

/* 🔥 Fullscreen */
.lightbox {
  display: none;
  position: fixed;
  top: 0;
  left: 0;

  width: 100%;
  height: 100%;

  background: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
  z-index: 1000;
}

.lightbox img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 10px;
}

/* Close button */
.lightbox span {
  position: absolute;
  top: 20px;
  right: 30px;

  font-size: 35px;
  color: white;
  cursor: pointer;
}

</style>
</head>

<body>

<!-- 🔙 Back Button -->
<a href="index.html" class="back-home">← Back to Home</a>

<section class="gallery-section">

  <div class="gallery-title-box">Gallery</div>

  <div class="gallery-container">

    <div class="gallery-item"><img src="img1.jpg"></div>
    <div class="gallery-item"><img src="img3.jpg"></div>
    <div class="gallery-item"><img src="img4.jpg"></div>
    <div class="gallery-item"><img src="img5.jpg"></div>
    <div class="gallery-item"><img src="Gal0.jpg"></div>
    <div class="gallery-item"><img src="Gal2.jpg"></div>
    <div class="gallery-item"><img src="Gal4.jpg"></div>
    <div class="gallery-item"><img src="Gal5.jpg"></div>
    <div class="gallery-item"><img src="Gal8.jpg"></div>
    <div class="gallery-item"><img src="Gall0.jpg"></div>
    <div class="gallery-item"><img src="Gall1.jpg"></div>
    <div class="gallery-item"><img src="Gall2.jpg"></div>
    <div class="gallery-item"><img src="Gall3.jpg"></div>

    <div class="gallery-item"><img src="Gall6.jpg"></div>
    <div class="gallery-item"><img src="Gall8.jpg"></div>
    <div class="gallery-item"><img src="Gall9.jpg"></div>
    <div class="gallery-item"><img src="imgA.jpg"></div>
    <div class="gallery-item"><img src="imgB.jpg"></div>
    <div class="gallery-item"><img src="imgC.jpg"></div>
    <div class="gallery-item"><img src="imgD.jpg"></div>
    <div class="gallery-item"><img src="imgE.jpg"></div>
    <div class="gallery-item"><img src="imgF.jpg"></div>
    <div class="gallery-item"><img src="imgG.jpg"></div>
    <div class="gallery-item"><img src="imgH.jpg"></div>
    <div class="gallery-item"><img src="imgI.jpg"></div>
    <div class="gallery-item"><img src="imgJ.jpg"></div>
    <div class="gallery-item"><img src="imgK.jpg"></div>
    <div class="gallery-item"><img src="imgL.jpg"></div>
    <div class="gallery-item"><img src="imgM.jpg"></div>
    <div class="gallery-item"><img src="imgN.jpg"></div>
    <div class="gallery-item"><img src="imgO.jpg"></div>
    <div class="gallery-item"><img src="imgP.jpg"></div>
    <div class="gallery-item"><img src="imgQ.jpg"></div>
    <div class="gallery-item"><img src="imgR.jpg"></div>
    <div class="gallery-item"><img src="imgS.jpg"></div>
    <div class="gallery-item"><img src="imgT.jpg"></div>
    <div class="gallery-item"><img src="imgU.jpg"></div>

  </div>

</section>

<!-- 🔥 Lightbox -->
<div class="lightbox" id="lightbox">
  <span onclick="closeImage()">&times;</span>
  <img id="lightbox-img">
</div>

<script>

const images = document.querySelectorAll('.gallery-item img');
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');

images.forEach(img => {
  img.addEventListener('click', () => {
    lightbox.style.display = 'flex';
    lightboxImg.src = img.src;
  });
});

function closeImage() {
  lightbox.style.display = 'none';
}

lightbox.addEventListener('click', (e) => {
  if (e.target !== lightboxImg) {
    lightbox.style.display = 'none';
  }
});

</script>

</body>
</html>
